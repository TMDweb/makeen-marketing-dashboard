<style>
:root{--g:#003f3f;--b:#a88575;--bk:#222;--nv:#132556;--mr:#59132e;--dg:#352f2e;--w:#fff;--bg:#f5f3f0;--gl:#e8f0ef;--bl:#f5ede9;--bd:#e0dbd5;--green:#1b7a4a;--red:#c0392b;--amber:#d4850a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--bk);min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--g)}
.login-box{background:var(--w);border-radius:16px;padding:40px 36px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{width:160px;margin:0 auto 16px}.login-logo svg{width:100%;height:auto}
.login-box h2{color:var(--b);font-size:13px;font-weight:500;margin-bottom:28px}
.login-box input{width:100%;padding:12px 16px;border-radius:10px;border:1.5px solid var(--bd);font-family:inherit;font-size:14px;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:var(--g)}
.login-btn{width:100%;padding:12px;border-radius:10px;background:var(--g);color:var(--w);font-family:inherit;font-size:14px;font-weight:700;border:none;cursor:pointer;margin-top:4px}
.login-btn:hover{background:#004d4d}
.login-err{color:var(--red);font-size:12px;margin-top:8px;display:none}
.remember-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;cursor:pointer;justify-content:flex-end}
.remember-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--g);cursor:pointer}
.remember-row span{font-size:12px;color:var(--dg)}
.dash-header{background:var(--g);padding:18px 28px}
.dash-header-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.dash-logo{width:72px;filter:brightness(0) invert(1);opacity:.85}.dash-logo svg{width:100%;height:auto}
.dash-stats{display:flex;gap:22px}
.dash-stat .v{font-size:17px;font-weight:700}.dash-stat .l{font-size:9px;color:rgba(255,255,255,.45);margin-top:1px}
.dash-meta{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.4);font-size:11px;margin-top:10px;justify-content:flex-end}
.dash-meta button{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.4);padding:3px 10px;border-radius:6px;font-size:10px;cursor:pointer;font-family:inherit}
.projects-grid{padding:20px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,63,63,.45);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px)}
.modal-box{background:var(--w);border-radius:14px;width:90%;max-width:440px;padding:24px;box-shadow:0 16px 48px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.ei{width:100%;padding:7px 10px;border-radius:7px;border:1.5px solid var(--bd);font-size:12px;font-family:inherit;box-sizing:border-box;outline:none}
.ei:focus{border-color:var(--g)}
.el{font-size:9px;color:var(--dg);display:block;margin-bottom:2px}
.sec-hdr{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .15s}
.sec-hdr:hover{background:#faf9f7}
.sec-body{padding:0 16px 12px}
.tool-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;cursor:pointer;transition:all .15s;border:1px solid var(--bd);background:var(--w);margin:2px}
.tool-pill.done{background:var(--gl);border-color:rgba(0,63,63,.18)}
.tool-chk{width:12px;height:12px;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
@media(max-width:680px){.projects-grid{padding:12px;grid-template-columns:1fr}.dash-stats{gap:14px}.dash-stat .v{font-size:14px}}
</style>
</head>

<div id="loginScreen" class="login-wrap">

    <div class="login-logo" id="loginLogo"></div>
    <h2>لوحة معلومات الحملات البيعية</h2>
    <form onsubmit="doLogin();return false" autocomplete="on">

      <input type="password" id="loginCode" name="password" placeholder="كلمة المرور" autocomplete="current-password">
      <label class="remember-row"><span>تذكر هذا الجهاز</span><input type="checkbox" id="rememberMe" checked></label>
      <button type="submit" class="login-btn">دخول</button>
    </form>
    <div id="loginErr" class="login-err"></div>
  </div>

    <div id="modalBody"></div>

</div>

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let DATA = {}, OPEN = {};

// ── Login ──
function doLogin(){
  const username=document.getElementById('loginName').value.trim();
  const pass=document.getElementById('loginCode').value.trim();
  const err=document.getElementById('loginErr');
  const btn=document.querySelector('.login-btn');
  if(!username){err.textContent='اكتب اسم المستخدم';err.style.display='block';return}
  if(!pass){err.textContent='اكتب كلمة المرور';err.style.display='block';return}
  btn.textContent='جاري التحقق...';btn.disabled=true;
  const key=username.charAt(0).toUpperCase()+username.slice(1);
  db.ref('users/'+key).once('value',snap=>{
    btn.textContent='دخول';btn.disabled=false;
    if(!snap.exists()||snap.val()!==pass){err.textContent='اسم المستخدم أو كلمة المرور غير صحيحة';err.style.display='block';return}
    const rem=document.getElementById('rememberMe').checked;
    if(rem){localStorage.setItem('makeen_user',key)}else{sessionStorage.setItem('makeen_user',key);localStorage.removeItem('makeen_user')}
    showDash(key);
  });
}
function doLogout(){
  localStorage.removeItem('makeen_user');sessionStorage.removeItem('makeen_user');
  document.getElementById('dashboard').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginName').value='';document.getElementById('loginCode').value='';
}
function showDash(name){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('userName').textContent='مرحبًا '+name;
  document.getElementById('dateDisplay').textContent=new Date().toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  loadData();
}
window.onload=function(){
  document.getElementById('loginLogo').innerHTML=LOGO_SVG;
  document.getElementById('dashLogo').innerHTML=LOGO_SVG;
  const s=localStorage.getItem('makeen_user')||sessionStorage.getItem('makeen_user');
  if(s)showDash(s);
};

// ── Data ──
function loadData(){
  db.ref('projects').on('value',snap=>{
    const val=snap.val();DATA={};
    PROJECTS.forEach(p=>{
      const raw=val&&val[p.id];
      if(raw&&Array.isArray(raw.tools)&&raw.tools.length===13){DATA[p.id]={...raw}}
      else{DATA[p.id]=JSON.parse(JSON.stringify(DEFAULTS[p.id]));db.ref('projects/'+p.id).set(DATA[p.id])}
    });
    render();
  });
}

// ── Sections ──
function secOpen(pid,si){const k=pid+'_'+si;return k in OPEN?OPEN[k]:si<4}
function togSec(pid,si){
  OPEN[pid+'_'+si]=!secOpen(pid,si);
  const el=document.getElementById('pcard-'+pid);
  if(el)el.outerHTML=cardHTML(pid);
}

// ── Tools ──
function togTool(pid,i){
  const v=!DATA[pid].tools[i].d;
  DATA[pid].tools[i].d=v;
  db.ref('projects/'+pid+'/tools/'+i+'/d').set(v);
  const el=document.getElementById('pcard-'+pid);
  if(el)el.outerHTML=cardHTML(pid);
  renderHeader();
}

  if(type==='edit'){
    document.getElementById('modalSub').textContent='تعديل الأرقام ومدة الحملة';
    document.getElementById('modalBody').innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div><label class="el">التسجيلات</label><input class="ei" id="e_leads" type="number" value="${d.leads}"></div>
        <div><label class="el">الحجوزات</label><input class="ei" id="e_booked" type="number" value="${d.booked}"></div>
        <div><label class="el">المبيعات</label><input class="ei" id="e_sold" type="number" value="${d.sold}"></div>
        <div><label class="el">الوحدات</label><input class="ei" id="e_units" type="number" value="${d.units}"></div>
        <div><label class="el">الميزانية</label><input class="ei" id="e_budget" type="number" value="${d.budget}"></div>
        <div><label class="el">المصروف</label><input class="ei" id="e_spent" type="number" value="${d.spent}"></div>
      </div>
      <div style="font-size:11px;font-weight:700;color:var(--g);margin-bottom:8px">مدة الحملة</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><label class="el">تاريخ البداية</label><input class="ei" id="e_ps" type="date" value="${d.promoStart||''}"></div>
        <div><label class="el">تاريخ الانتهاء (فاضي = مستمرة)</label><input class="ei" id="e_pe" type="date" value="${d.promoEnd||''}"></div>
      </div>`;
    setTimeout(()=>document.getElementById('e_leads')?.focus(),50);
  }else if(type==='note'){
    document.getElementById('modalSub').textContent='ملاحظات';
    document.getElementById('modalBody').innerHTML=`<textarea id="m_note" style="width:100%;min-height:90px;padding:12px;border-radius:8px;border:1.5px solid var(--bd);font-size:13px;font-family:inherit;resize:vertical;box-sizing:border-box;line-height:1.7;direction:rtl">${d.note||''}</textarea>`;
    setTimeout(()=>document.getElementById('m_note')?.focus(),50);
  }else if(type==='toollink'){
    const ti=extra,t=d.tools[ti];
    document.getElementById('modalSub').textContent='رابط: '+t.n;
    document.getElementById('modalBody').innerHTML=`<input id="m_tl" dir="ltr" type="url" value="${t.l||''}" placeholder="https://..." style="width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--bd);font-size:13px;font-family:monospace;box-sizing:border-box">${t.l?`<a href="${t.l}" target="_blank" style="display:inline-block;margin-top:8px;font-size:12px;color:var(--nv)">فتح الرابط ↗</a>`:''}`;
    setTimeout(()=>document.getElementById('m_tl')?.focus(),50);
  }
  document.getElementById('modalOverlay').style.display='flex';
}
function closeModal(){
  if(!_modal)return;
  const{type,pid,extra}=_modal;
  const d=DATA[pid];
  if(type==='edit'){
    const f={leads:+document.getElementById('e_leads').value||0,booked:+document.getElementById('e_booked').value||0,sold:+document.getElementById('e_sold').value||0,units:+document.getElementById('e_units').value||0,budget:+document.getElementById('e_budget').value||0,spent:+document.getElementById('e_spent').value||0,promoStart:document.getElementById('e_ps').value||null,promoEnd:document.getElementById('e_pe').value||null};
    Object.assign(d,f);
    Object.entries(f).forEach(([k,v])=>db.ref('projects/'+pid+'/'+k).set(v));
  }else if(type==='note'){
    const v=document.getElementById('m_note')?.value||'';d.note=v;db.ref('projects/'+pid+'/note').set(v);
  }else if(type==='toollink'){
    const v=document.getElementById('m_tl')?.value||'';d.tools[extra].l=v;db.ref('projects/'+pid+'/tools/'+extra+'/l').set(v);
  }
  _modal=null;document.getElementById('modalOverlay').style.display='none';
  const el=document.getElementById('pcard-'+pid);
  if(el)el.outerHTML=cardHTML(pid);
  renderHeader();
}
function cancelModal(){_modal=null;document.getElementById('modalOverlay').style.display='none';}

// ── Helpers ──
function fmtDate(s){if(!s)return'—';const d=new Date(s);return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')}
function weeksElapsed(s){if(!s)return 0;return Math.max(0,Math.floor((new Date()-new Date(s))/(7*864e5)))}
function weeksText(w){if(w===0)return'أقل من أسبوع';if(w===1)return'أسبوع واحد';if(w===2)return'أسبوعين';return w+' أسابيع'}
function saleCol(pct){return pct>=90?'#1b7a4a':pct>=50?'#132556':pct>=25?'#d4850a':'#59132e'}
function ringHTML(pct,color,sz){
  sz=sz||52;const st=5,r=(sz-st)/2,c=2*Math.PI*r,o=c-(pct/100)*c;
  return `<div style="position:relative;width:${sz}px;height:${sz}px;flex-shrink:0"><svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#e8e4e0" stroke-width="${st}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${st}" stroke-dasharray="${c}" stroke-dashoffset="${o}" stroke-linecap="round" style="transition:stroke-dashoffset .5s"/></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:${color};line-height:1">${pct}%</div></div>`;
}
function secHTML(pid,si,title,accent,summary,content){
  const open=secOpen(pid,si);
  return `<div style="border-bottom:1px solid var(--bd)"><div class="sec-hdr" onclick="togSec('${pid}',${si})" style="background:${open?'transparent':'#faf9f7'}"><div style="display:flex;align-items:center;gap:6px"><div style="width:3px;height:11px;border-radius:2px;background:${accent};flex-shrink:0"></div><span style="font-size:11px;font-weight:700;color:var(--g)">${title}</span></div><div style="display:flex;align-items:center;gap:8px">${!open&&summary?`<span style="font-size:10px;color:var(--dg);font-weight:500">${summary}</span>`:''}<span style="font-size:12px;color:var(--dg);display:inline-block;transition:transform .2s;transform:${open?'rotate(90deg)':'rotate(0deg)'}">◂</span></div></div>${open?`<div class="sec-body">${content}</div>`:''}</div>`;
}

// ── Card ──
function cardHTML(pid){
  const p=PROJECTS.find(x=>x.id===pid),d=DATA[pid];
  if(!d)return'';
  const soldPct=Math.round(((d.sold+d.booked)/d.units)*100);
  const remain=d.units-d.sold-d.booked;
  const cpl=d.leads>0?Math.round(d.spent/d.leads):0;
  const budgetLeft=d.budget-d.spent;
  const toolsDone=d.tools.filter(t=>t.d).length;
  const weeks=weeksElapsed(d.promoStart);
  const isActive=!d.promoEnd;
  const sc=saleCol(soldPct);

  // Section 0: أرقام البيع
  const s0=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
    ${[{v:d.leads.toLocaleString(),l:'تسجيل',c:'#132556',bg:'#eef1f8'},{v:d.booked,l:'حجز',c:'#d4850a',bg:'#fef7ec'},{v:d.sold,l:'مباع',c:'#1b7a4a',bg:'#edf7f0'},{v:remain,l:'متبقي',c:'#c0392b',bg:'#fdf0ee'}].map(x=>`<div style="text-align:center;padding:9px 4px;border-radius:8px;background:${x.bg}"><div style="font-size:20px;font-weight:800;color:${x.c};line-height:1">${x.v}</div><div style="font-size:9px;color:var(--dg);margin-top:3px">${x.l}</div></div>`).join('')}
  </div>
  <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;background:#ece8e3;margin-top:8px"><div style="width:${Math.round(d.sold/d.units*100)}%;background:#1b7a4a;transition:width .5s"></div><div style="width:${Math.round(d.booked/d.units*100)}%;background:#d4850a;transition:width .5s"></div></div>
  <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:var(--dg)"><span>مباع ${Math.round(d.sold/d.units*100)}%</span><span>محجوز ${Math.round(d.booked/d.units*100)}%</span><span style="color:var(--red)">متبقي ${Math.round(remain/d.units*100)}%</span></div>`;

  // Section 1: مدة الحملة
  const s1=`<div style="padding:8px 12px;border-radius:8px;background:#faf9f7;border:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center">
    <div><div style="font-size:9px;color:var(--dg)">بداية الترويج · ${fmtDate(d.promoStart)}</div><div style="font-size:12px;font-weight:700;color:var(--g);margin-top:2px">${weeksText(weeks)} من بداية الحملة</div></div>
    <div style="padding:3px 10px;border-radius:6px;background:${isActive?'#edf7f0':'var(--bl)'};font-size:10px;font-weight:700;color:${isActive?'#1b7a4a':'var(--b)'};white-space:nowrap">${isActive?'لازالت مستمرة':fmtDate(d.promoEnd)}</div>
  </div>`;

  // Section 2: الميزانية
  const bPct=Math.round(d.spent/d.budget*100);
  const s2=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
    <div style="text-align:center;padding:8px 6px;border-radius:8px;background:var(--gl)"><div style="font-size:14px;font-weight:800;color:var(--g)">${d.budget.toLocaleString()}</div><div style="font-size:8px;color:var(--dg);margin-top:2px">الميزانية</div></div>
    <div style="text-align:center;padding:8px 6px;border-radius:8px;background:var(--bl)"><div style="font-size:14px;font-weight:800;color:var(--b)">${cpl} <span style="font-size:10px;font-weight:600">ريال</span></div><div style="font-size:8px;color:var(--dg);margin-top:2px">تكلفة الليد</div></div>
    <div style="text-align:center;padding:8px 6px;border-radius:8px;background:${budgetLeft<d.budget*.2?'#fdf0ee':'var(--gl)'}"><div style="font-size:14px;font-weight:800;color:${budgetLeft<d.budget*.2?'var(--red)':'var(--g)'}">${budgetLeft.toLocaleString()}</div><div style="font-size:8px;color:var(--dg);margin-top:2px">المتبقي</div></div>
  </div>
  <div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--dg);margin-bottom:2px"><span>الإنفاق</span><span style="font-weight:700;color:var(--b)">${bPct}%</span></div><div style="height:5px;border-radius:3px;background:#ece8e3;overflow:hidden"><div style="height:100%;width:${bPct}%;border-radius:3px;background:var(--b);transition:width .5s"></div></div></div>`;

  // Section 3: المواد الاتصالية
  const overallPct=Math.round(toolsDone/d.tools.length*100);
  const s3=`<div style="height:4px;border-radius:2px;background:#ece8e3;overflow:hidden;margin-bottom:10px"><div style="height:100%;width:${overallPct}%;border-radius:2px;background:var(--g);transition:width .5s"></div></div>
  ${GROUPS.map(gr=>{
    const done=gr.keys.filter(k=>d.tools[k]?.d).length;
    return `<div style="margin-bottom:8px"><div style="font-size:9px;font-weight:700;color:var(--b);margin-bottom:4px;display:flex;justify-content:space-between"><span>${gr.title}</span><span style="color:var(--dg)">${done}/${gr.keys.length}</span></div><div style="display:flex;flex-wrap:wrap">${gr.keys.map(ki=>{const t=d.tools[ki];if(!t)return'';return`<div class="tool-pill ${t.d?'done':''}" onclick="togTool('${pid}',${ki})" oncontextmenu="event.preventDefault();openModal('toollink','${pid}',${ki})"><div class="tool-chk" style="background:${t.d?'var(--g)':'var(--bd)'}">${t.d?'<svg width="8" height="8" viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div><span style="font-size:10px;font-weight:600;color:${t.d?'var(--g)':'var(--dg)'};white-space:nowrap">${t.n}</span>${t.d&&t.l?`<a href="${t.l}" target="_blank" onclick="event.stopPropagation()" style="font-size:8px;color:var(--nv);text-decoration:none">↗</a>`:''}</div>`;}).join('')}</div></div>`;
  }).join('')}`;

  // Section 4: ملاحظات
  const s4=`<div style="padding:8px 12px;border-radius:8px;background:#faf9f7;border:1px solid var(--bd);font-size:11px;line-height:1.7;color:var(--dg);cursor:pointer" onclick="openModal('note','${pid}')">${d.note||'اضغط لإضافة ملاحظة...'}</div>`;

  const sumSale=`${d.sold} مباع · ${remain} متبقي`;
  const sumCamp=`${weeks} أسبوع · ${isActive?'مستمرة':'منتهية'}`;
  const sumBudget=`${d.spent.toLocaleString()} / ${d.budget.toLocaleString()} · CPL ${cpl} ر.س`;
  const sumTools=`${toolsDone}/${d.tools.length} جاهز`;
  const sumNote=d.note?d.note.substring(0,35)+'...':'';

  return `<div id="pcard-${pid}" style="background:var(--w);border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05);border:1px solid var(--bd)">
    <div style="padding:16px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center">
      <a href="${d.url||'#'}" target="_blank" rel="noopener noreferrer" style="text-decoration:none"><div style="font-size:20px;font-weight:800;color:var(--g)">${p.name}</div><div style="font-size:12px;color:var(--b);margin-top:2px">${p.loc}</div></a>
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="openModal('edit','${pid}')" style="padding:5px 12px;border-radius:7px;border:1px solid var(--bd);background:var(--w);color:var(--dg);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit">تعديل</button>
        ${ringHTML(soldPct,sc)}
      </div>
    </div>
    ${secHTML(pid,0,'أرقام البيع','#1b7a4a',sumSale,s0)}
    ${secHTML(pid,1,'مدة الحملة','#132556',sumCamp,s1)}
    ${secHTML(pid,2,'الميزانية','#a88575',sumBudget,s2)}
    ${secHTML(pid,3,'المواد الاتصالية','#003f3f',sumTools,s3)}
    ${secHTML(pid,4,'ملاحظات','#59132e',sumNote,s4)}
  </div>`;
}

// ── Render ──
function renderHeader(){
  const tL=PROJECTS.reduce((s,p)=>s+(DATA[p.id]?.leads||0),0);
  const tS=PROJECTS.reduce((s,p)=>s+(DATA[p.id]?.sold||0),0);
  const tB=PROJECTS.reduce((s,p)=>s+(DATA[p.id]?.booked||0),0);
  const tU=PROJECTS.reduce((s,p)=>s+(DATA[p.id]?.units||0),0);
  const tSp=PROJECTS.reduce((s,p)=>s+(DATA[p.id]?.spent||0),0);
  const sP=tU>0?Math.round((tS+tB)/tU*100):0;
  const avgCPL=tL>0?Math.round(tSp/tL):0;
  document.getElementById('headerStats').innerHTML=[
    {v:tL.toLocaleString(),l:'تسجيل',c:'#fff'},
    {v:tS+tB,l:'مباع + محجوز',c:'#7be0a8'},
    {v:sP+'%',l:'نسبة البيع',c:'#a88575'},
    {v:avgCPL+' ر.س',l:'متوسط CPL',c:'#b8d8d0'},
  ].map(s=>`<div class="dash-stat"><div class="v" style="color:${s.c}">${s.v}</div><div class="l">${s.l}</div></div>`).join('');
}

function render(){
  renderHeader();
  document.getElementById('projectsGrid').innerHTML=PROJECTS.map(p=>cardHTML(p.id)).join('');
}

</script>
</body>
</html>

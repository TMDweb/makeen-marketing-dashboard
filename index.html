<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أساس مكين | لوحة متابعة المشاريع</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--g:#003f3f;--b:#a88575;--bk:#222;--nv:#132556;--mr:#59132e;--dg:#352f2e;--w:#fff;--bg:#f5f3f0;--bd:#e0dbd5;--green:#1b7a4a;--red:#c0392b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--bk);min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--g)}
.login-box{background:var(--w);border-radius:16px;padding:40px 36px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{width:160px;margin:0 auto 16px}.login-logo svg{width:100%;height:auto}
.login-box h2{color:var(--b);font-size:13px;font-weight:500;margin-bottom:28px}
.login-box input{width:100%;padding:12px 16px;border-radius:10px;border:1.5px solid var(--bd);font-family:inherit;font-size:14px;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:var(--g)}
.login-btn{width:100%;padding:12px;border-radius:10px;background:var(--g);color:var(--w);font-family:inherit;font-size:14px;font-weight:700;border:none;cursor:pointer;margin-top:4px}
.login-btn:hover{background:#004d4d}
.login-err{color:var(--red);font-size:12px;margin-top:8px;display:none}
.remember-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;cursor:pointer;justify-content:flex-end}
.remember-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--g);cursor:pointer}
.remember-row span{font-size:12px;color:var(--dg)}
.dash-header{background:var(--g);padding:18px 28px}
.dash-header-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.dash-logo{width:72px;filter:brightness(0) invert(1);opacity:.85}.dash-logo svg{width:100%;height:auto}
.dash-stats{display:flex;gap:22px}
.dash-stat .v{font-size:17px;font-weight:700}.dash-stat .l{font-size:9px;color:rgba(255,255,255,.45);margin-top:1px}
.dash-meta{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.4);font-size:11px;margin-top:10px;justify-content:flex-end}
.dash-meta button{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.4);padding:3px 10px;border-radius:6px;font-size:10px;cursor:pointer;font-family:inherit}
.projects-grid{padding:20px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.pcard{background:var(--w);border-radius:12px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.05);border:1px solid var(--bd)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,63,63,.45);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px)}
.modal-box{background:var(--w);border-radius:14px;width:90%;max-width:440px;padding:24px;box-shadow:0 16px 48px rgba(0,0,0,.15)}
.edit-input{width:100%;padding:7px 9px;border-radius:6px;border:1px solid var(--bd);font-size:13px;font-family:inherit;box-sizing:border-box}
.edit-label{font-size:10px;color:var(--dg);display:block;margin-bottom:3px}
@media(max-width:680px){.projects-grid{padding:12px;grid-template-columns:1fr}.dash-stats{gap:14px}.dash-stat .v{font-size:14px}}
</style>
</head>
<body>

<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <div class="login-logo" id="loginLogo"></div>
    <h2>لوحة معلومات الحملات البيعية</h2>
    <form onsubmit="doLogin();return false" autocomplete="on">
      <input type="text" id="loginName" name="username" placeholder="اسم المستخدم" autocomplete="username">
      <input type="password" id="loginCode" name="password" placeholder="كلمة المرور" autocomplete="current-password">
      <label class="remember-row"><span>تذكر هذا الجهاز</span><input type="checkbox" id="rememberMe" checked></label>
      <button type="submit" class="login-btn">دخول</button>
    </form>
    <div id="loginErr" class="login-err"></div>
  </div>
</div>

<div id="dashboard" style="display:none">
  <div class="dash-header">
    <div class="dash-header-top">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="dash-logo" id="dashLogo"></div>
        <div>
          <div style="color:#fff;font-size:16px;font-weight:700">أساس مكين</div>
          <div style="color:rgba(255,255,255,.55);font-size:11px;margin-top:2px">لوحة متابعة المشاريع · الخطة الاتصالية</div>
        </div>
      </div>
      <div id="headerStats" class="dash-stats"></div>
    </div>
    <div class="dash-meta">
      <span id="userName"></span><span id="dateDisplay"></span>
      <button onclick="doLogout()">خروج</button>
    </div>
  </div>
  <div class="projects-grid" id="projectsGrid"></div>
  <div style="text-align:center;padding:6px 24px 20px;font-size:9px;color:#c4bfb8">اضغط المادة لتفعيلها · اضغط الملاحظة لتعديلها · زر تعديل للأرقام</div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div style="font-size:15px;font-weight:700;color:var(--g);margin-bottom:2px" id="modalTitle"></div>
    <div style="font-size:11px;color:var(--dg);margin-bottom:14px" id="modalSub"></div>
    <div id="modalBody"></div>
    <div style="margin-top:16px">
      <button onclick="closeModal()" style="padding:8px 28px;border-radius:8px;background:var(--g);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">تم</button>
    </div>
  </div>
</div>

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let DATA = {};

// ── Login ──
function doLogin(){
  const username=document.getElementById('loginName').value.trim();
  const pass=document.getElementById('loginCode').value.trim();
  const err=document.getElementById('loginErr');
  const btn=document.querySelector('.login-btn');
  if(!username){err.textContent='اكتب اسم المستخدم';err.style.display='block';return}
  if(!pass){err.textContent='اكتب كلمة المرور';err.style.display='block';return}
  btn.textContent='جاري التحقق...';btn.disabled=true;
  const key=username.charAt(0).toUpperCase()+username.slice(1);
  db.ref('users/'+key).once('value',snap=>{
    btn.textContent='دخول';btn.disabled=false;
    if(!snap.exists()||snap.val()!==pass){err.textContent='اسم المستخدم أو كلمة المرور غير صحيحة';err.style.display='block';return}
    const rem=document.getElementById('rememberMe').checked;
    if(rem){localStorage.setItem('makeen_user',key)}else{sessionStorage.setItem('makeen_user',key);localStorage.removeItem('makeen_user')}
    showDash(key);
  });
}
function doLogout(){
  localStorage.removeItem('makeen_user');sessionStorage.removeItem('makeen_user');
  document.getElementById('dashboard').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginName').value='';document.getElementById('loginCode').value='';
}
function showDash(name){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('userName').textContent='مرحبًا '+name;
  document.getElementById('dateDisplay').textContent=new Date().toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  loadData();
}
window.onload=function(){
  document.getElementById('loginLogo').innerHTML=LOGO_SVG;
  document.getElementById('dashLogo').innerHTML=LOGO_SVG;
  const s=localStorage.getItem('makeen_user')||sessionStorage.getItem('makeen_user');
  if(s)showDash(s);
};

// ── Data ──
function migrateOld(old){
  const keys=['video','photos','designs','landing','influencers','ads'];
  const materials={};
  keys.forEach((k,i)=>{const t=old.tools&&old.tools[i];materials[k]={done:t?!!t.d:false,link:t?(t.l||''):''};});
  return{leads:old.leads||0,booked:(old.sold||0)+(old.booked||0),totalUnits:old.units||0,materials,notes:old.note||''};
}

function loadData(){
  db.ref('projects').on('value',snap=>{
    const val=snap.val();
    DATA={};
    PROJECTS.forEach(p=>{
      const raw=val&&val[p.id];
      if(raw){
        if(raw.totalUnits!==undefined){DATA[p.id]={...raw}}
        else{DATA[p.id]=migrateOld(raw);db.ref('projects/'+p.id).set(DATA[p.id])}
      }else{
        DATA[p.id]=JSON.parse(JSON.stringify(DEFAULTS[p.id]));
        db.ref('projects/'+p.id).set(DATA[p.id]);
      }
    });
    render();
  });
}

function toggleMaterial(pid,mk){
  const v=!DATA[pid].materials[mk].done;
  DATA[pid].materials[mk].done=v;
  db.ref('projects/'+pid+'/materials/'+mk+'/done').set(v);
  render();
}

// ── Modal ──
let _modal=null;
function openModal(type,pid,mk){
  _modal={type,pid,mk};
  const proj=PROJECTS.find(x=>x.id===pid);
  const d=DATA[pid];
  document.getElementById('modalTitle').textContent=proj.name;
  if(type==='note'){
    document.getElementById('modalSub').textContent='ملاحظات';
    document.getElementById('modalBody').innerHTML=`<textarea id="mta" style="width:100%;min-height:90px;padding:12px;border-radius:8px;border:1.5px solid var(--bd);font-size:13px;font-family:inherit;resize:vertical;box-sizing:border-box;line-height:1.7;direction:rtl">${d.notes||''}</textarea>`;
    setTimeout(()=>document.getElementById('mta')?.focus(),50);
  }else if(type==='link'){
    const mat=MATERIALS.find(x=>x.key===mk);
    const lv=d.materials[mk]?.link||'';
    document.getElementById('modalSub').textContent='رابط: '+mat.label;
    document.getElementById('modalBody').innerHTML=`<input id="mli" dir="ltr" type="url" value="${lv}" placeholder="https://..." style="width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--bd);font-size:13px;font-family:monospace;box-sizing:border-box">${lv?`<a href="${lv}" target="_blank" style="display:inline-block;margin-top:8px;font-size:12px;color:var(--nv)">فتح الرابط ↗</a>`:''}`;
    setTimeout(()=>document.getElementById('mli')?.focus(),50);
  }else if(type==='edit'){
    document.getElementById('modalSub').textContent='تعديل الأرقام';
    document.getElementById('modalBody').innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px"><div><label class="edit-label">تسجيلات</label><input class="edit-input" id="e1" type="number" value="${d.leads}"></div><div><label class="edit-label">محجوز / مباع</label><input class="edit-input" id="e2" type="number" value="${d.booked}"></div><div><label class="edit-label">إجمالي الوحدات</label><input class="edit-input" id="e3" type="number" value="${d.totalUnits}"></div></div>`;
  }
  document.getElementById('modalOverlay').style.display='flex';
}
function closeModal(){
  if(!_modal)return;
  const{type,pid,mk}=_modal;
  if(type==='note'){const v=document.getElementById('mta')?.value||'';DATA[pid].notes=v;db.ref('projects/'+pid+'/notes').set(v);}
  else if(type==='link'){const v=document.getElementById('mli')?.value||'';DATA[pid].materials[mk].link=v;db.ref('projects/'+pid+'/materials/'+mk+'/link').set(v);}
  else if(type==='edit'){
    const l=+(document.getElementById('e1')?.value||0),b=+(document.getElementById('e2')?.value||0),u=+(document.getElementById('e3')?.value||0);
    DATA[pid].leads=l;DATA[pid].booked=b;DATA[pid].totalUnits=u;
    db.ref('projects/'+pid+'/leads').set(l);db.ref('projects/'+pid+'/booked').set(b);db.ref('projects/'+pid+'/totalUnits').set(u);
  }
  _modal=null;document.getElementById('modalOverlay').style.display='none';render();
}

// ── Ring ──
function ringHTML(pct){
  const sz=54,st=5.5,r=(sz-st)/2,c=2*Math.PI*r,o=c-(pct/100)*c;
  const col=pct>=75?'#1b7a4a':pct>=40?'#a88575':'#132556';
  return `<div style="position:relative;display:flex;align-items:center;justify-content:center;width:${sz}px;height:${sz}px;flex-shrink:0"><svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#ece8e3" stroke-width="${st}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${st}" stroke-dasharray="${c}" stroke-dashoffset="${o}" stroke-linecap="round" style="transition:stroke-dashoffset .7s"/></svg><div style="position:absolute;font-size:12px;font-weight:700;color:#222">${pct}<span style="font-size:7px">%</span></div></div>`;
}

// ── Render ──
function render(){
  const tL=PROJECTS.reduce((s,p)=>s+(DATA[p.id]?.leads||0),0);
  const tB=PROJECTS.reduce((s,p)=>s+(DATA[p.id]?.booked||0),0);
  const tU=PROJECTS.reduce((s,p)=>s+(DATA[p.id]?.totalUnits||0),0);
  const tMD=PROJECTS.reduce((s,p)=>s+MATERIALS.filter(m=>DATA[p.id]?.materials?.[m.key]?.done).length,0);
  const sP=tU>0?Math.round(tB/tU*100):0;
  const mP=Math.round(tMD/(PROJECTS.length*MATERIALS.length)*100);

  document.getElementById('headerStats').innerHTML=[
    {v:tL.toLocaleString(),l:'تسجيل',c:'#fff'},
    {v:tB,l:'حجز',c:'#7be0a8'},
    {v:sP+'%',l:'نسبة البيع',c:'#a88575'},
    {v:mP+'%',l:'جاهزية المواد',c:'#b8d8d0'},
  ].map(s=>`<div class="dash-stat"><div class="v" style="color:${s.c}">${s.v}</div><div class="l">${s.l}</div></div>`).join('');

  document.getElementById('projectsGrid').innerHTML=PROJECTS.map(p=>{
    const d=DATA[p.id];if(!d)return'';
    const sP=d.totalUnits>0?Math.round(d.booked/d.totalUnits*100):0;
    const rem=d.totalUnits-d.booked;
    const mDone=MATERIALS.filter(m=>d.materials?.[m.key]?.done).length;

    const pills=MATERIALS.map(m=>{
      const md=d.materials?.[m.key];
      const done=md?.done,lnk=md?.link?.trim();
      return `<div style="display:inline-flex;align-items:center"><span onclick="toggleMaterial('${p.id}','${m.key}')" style="padding:3px 9px;border-radius:${lnk?'5px 0 0 5px':'5px'};font-size:10px;font-weight:600;cursor:pointer;background:${done?'var(--g)':'#f0ece7'};color:${done?'#fff':'#aaa'};border:1px solid ${done?'var(--g)':'#ddd'};transition:all .15s;user-select:none">${m.label}</span>${lnk?`<a href="${lnk}" target="_blank" onclick="event.stopPropagation()" style="padding:3px 5px;border-radius:0 5px 5px 0;font-size:10px;line-height:1.6;background:${done?'#005252':'#e4dfd9'};color:${done?'#7ee8e8':'#888'};border:1px solid ${done?'var(--g)':'#ddd'};border-right:none;text-decoration:none">↗</a>`:''}</div>`;
    }).join('');

    const linkBtns=MATERIALS.map(m=>`<span onclick="openModal('link','${p.id}','${m.key}')" style="font-size:9px;color:${d.materials?.[m.key]?.link?'var(--nv)':'#ccc'};cursor:pointer;padding:1px 4px" title="رابط ${m.label}">🔗 ${m.label}</span>`).join('');

    const noteStyle=d.notes
      ?`border-right:3px solid var(--b);border-top:1px solid #ece7e0;border-bottom:1px solid #ece7e0;border-left:1px solid #ece7e0;background:#fdfbf8;color:var(--dg)`
      :`border:1px dashed var(--bd);background:var(--bg);color:#c4bfb8`;

    return `<div class="pcard">
      <div style="padding:16px 18px 10px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:15px;font-weight:700;color:var(--g)">${p.name}</div><div style="font-size:11px;color:var(--b);margin-top:1px">${p.loc}</div></div>
        <div style="display:flex;align-items:center;gap:8px">
          <button onclick="openModal('edit','${p.id}')" style="background:none;border:1px solid var(--bd);border-radius:6px;padding:3px 9px;font-size:10px;color:var(--dg);cursor:pointer;font-family:inherit">تعديل</button>
          ${ringHTML(sP)}
        </div>
      </div>
      <div style="padding:0 18px 14px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px">
        ${[{v:d.leads,l:'تسجيل',c:'var(--nv)'},{v:d.booked,l:'حجز',c:'#1b7a4a'},{v:sP+'%',l:'مباع',c:sP>=70?'#1b7a4a':'var(--b)'},{v:rem,l:'متبقي',c:'var(--mr)'}]
          .map(m=>`<div style="text-align:center;padding:7px 2px;border-radius:8px;background:var(--bg)"><div style="font-size:14px;font-weight:700;color:${m.c}">${m.v}</div><div style="font-size:8px;color:var(--dg);margin-top:1px">${m.l}</div></div>`).join('')}
      </div>
      <div style="padding:0 18px 12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:10px;font-weight:600;color:var(--dg)">المواد الاتصالية</span>
          <span style="font-size:10px;font-weight:700;color:${mDone===6?'#1b7a4a':'var(--b)'}">${mDone}/6</span>
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">${pills}</div>
        <div style="display:flex;gap:2px;flex-wrap:wrap">${linkBtns}</div>
      </div>
      <div style="padding:0 18px 16px">
        <div onclick="openModal('note','${p.id}')" style="padding:7px 12px;border-radius:8px;font-size:11px;line-height:1.6;cursor:pointer;${noteStyle}">${d.notes||'ملاحظة...'}</div>
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>

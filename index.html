<style>
:root{--g:#003f3f;--b:#a88575;--bk:#222;--nv:#132556;--mr:#59132e;--dg:#352f2e;--w:#fff;--bg:#f5f3f0;--gl:#e8f0ef;--bl:#f5ede9;--bd:#e0dbd5;--green:#1b7a4a;--red:#c0392b;--amber:#d4850a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--bk);min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--g)}
.login-box{background:var(--w);border-radius:16px;padding:40px 36px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{width:160px;margin:0 auto 16px}.login-logo svg{width:100%;height:auto}
.login-box h2{color:var(--b);font-size:13px;font-weight:500;margin-bottom:28px}
.login-box input{width:100%;padding:12px 16px;border-radius:10px;border:1.5px solid var(--bd);font-family:inherit;font-size:14px;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:var(--g)}
.login-btn{width:100%;padding:12px;border-radius:10px;background:var(--g);color:var(--w);font-family:inherit;font-size:14px;font-weight:700;border:none;cursor:pointer;margin-top:4px}
.login-btn:hover{background:#004d4d}
.login-err{color:var(--red);font-size:12px;margin-top:8px;display:none}
.remember-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;cursor:pointer;justify-content:flex-end}
.remember-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--g);cursor:pointer}
.remember-row span{font-size:12px;color:var(--dg)}
.dash-header{background:var(--g);padding:18px 28px}
.dash-header-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.dash-logo{width:72px;filter:brightness(0) invert(1);opacity:.85}.dash-logo svg{width:100%;height:auto}
.dash-stats{display:flex;gap:22px}
.dash-stat .v{font-size:17px;font-weight:700}.dash-stat .l{font-size:9px;color:rgba(255,255,255,.45);margin-top:1px}
.dash-meta{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.4);font-size:11px;margin-top:10px;justify-content:flex-end}
.dash-meta button{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.4);padding:3px 10px;border-radius:6px;font-size:10px;cursor:pointer;font-family:inherit}
.projects-grid{padding:20px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,63,63,.45);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px)}
.modal-box{background:var(--w);border-radius:14px;width:90%;max-width:440px;padding:24px;box-shadow:0 16px 48px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.ei{width:100%;padding:7px 10px;border-radius:7px;border:1.5px solid var(--bd);font-size:12px;font-family:inherit;box-sizing:border-box;outline:none}
.ei:focus{border-color:var(--g)}
.el{font-size:9px;color:var(--dg);display:block;margin-bottom:2px}
.sec-hdr{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .15s}
.sec-hdr:hover{background:#faf9f7}
.sec-body{padding:0 16px 12px}
.tool-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;cursor:pointer;transition:all .15s;border:1px solid var(--bd);background:var(--w);margin:2px}
.tool-pill.done{background:var(--gl);border-color:rgba(0,63,63,.18)}
.tool-chk{width:12px;height:12px;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.tab-btn{padding:11px 18px;border:none;background:none;font-family:inherit;font-size:12px;font-weight:600;color:var(--dg);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--g)}
.active-tab{color:var(--g);border-bottom-color:var(--g)}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{padding:8px 10px;text-align:right;font-size:10px;font-weight:700;color:var(--dg);background:#faf9f7;border-bottom:2px solid var(--bd);cursor:pointer;white-space:nowrap;user-select:none}
.tbl th:hover{color:var(--g)}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--bd);vertical-align:middle}
.tbl tr:hover td{background:#faf9f7}
.tbl tr:last-child td{border-bottom:none}
.kpi-card{background:var(--w);border-radius:12px;padding:16px 20px;border:1px solid var(--bd);box-shadow:0 1px 6px rgba(0,0,0,.04)}
@media(max-width:680px){.projects-grid{padding:12px;grid-template-columns:1fr}.dash-stats{gap:14px}.dash-stat .v{font-size:14px}}
</style>

firebase.initializeApp(firebaseConfig);

// ── Login ──
function doLogin(){
  const username=document.getElementById('loginName').value.trim();
  const pass=document.getElementById('loginCode').value.trim();
  const err=document.getElementById('loginErr');
  const btn=document.querySelector('.login-btn');
  if(!username){err.textContent='اكتب اسم المستخدم';err.style.display='block';return}
  if(!pass){err.textContent='اكتب كلمة المرور';err.style.display='block';return}
  btn.textContent='جاري التحقق...';btn.disabled=true;
  const key=username.charAt(0).toUpperCase()+username.slice(1);
  db.ref('users/'+key).once('value',snap=>{
    btn.textContent='دخول';btn.disabled=false;
    if(!snap.exists()||snap.val()!==pass){err.textContent='اسم المستخدم أو كلمة المرور غير صحيحة';err.style.display='block';return}
    const rem=document.getElementById('rememberMe').checked;
    if(rem){localStorage.setItem('makeen_user',key)}else{sessionStorage.setItem('makeen_user',key);localStorage.removeItem('makeen_user')}
    showDash(key);
  });
}
function doLogout(){
  localStorage.removeItem('makeen_user');sessionStorage.removeItem('makeen_user');
  document.getElementById('dashboard').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginName').value='';document.getElementById('loginCode').value='';
}
function showDash(name){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('userName').textContent='مرحبًا '+name;
  document.getElementById('dateDisplay').textContent=new Date().toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  loadData();
  loadOrder();
}
window.onload=function(){
  document.getElementById('loginLogo').innerHTML=LOGO_SVG;
  document.getElementById('dashLogo').innerHTML=LOGO_SVG;
  const s=localStorage.getItem('makeen_user')||sessionStorage.getItem('makeen_user');
  if(s)showDash(s);
};

// ── Data ──
function loadData(){
  db.ref('projects').on('value',snap=>{
    const val=snap.val();DATA={};
    PROJECTS.forEach(p=>{
      const raw=val&&val[p.id];
      if(raw&&raw._v===6&&Array.isArray(raw.tools)&&raw.tools.length>0){DATA[p.id]={...raw}}
      else{DATA[p.id]={_v:6,...JSON.parse(JSON.stringify(DEFAULTS[p.id]))};db.ref('projects/'+p.id).set(DATA[p.id])}
    });
    render();
  });
}

// ── Sections ──
function secOpen(pid,si){const k=pid+'_'+si;return k in OPEN?OPEN[k]:si<4}
function togSec(pid,si){
  OPEN[pid+'_'+si]=!secOpen(pid,si);
  const el=document.getElementById('pcard-'+pid);

}

// ── Tools ──
function togTool(pid,i){
  const v=!DATA[pid].tools[i].d;
  DATA[pid].tools[i].d=v;
  db.ref('projects/'+pid+'/tools/'+i+'/d').set(v);
  const el=document.getElementById('pcard-'+pid);
  if(el)el.outerHTML=cardHTML(pid);
  renderHeader();
}
function addTool(pid,gid){
  openModal('addtool',pid,gid);
}
function delTool(pid,i){
  if(!confirm('حذف "'+DATA[pid].tools[i].n+'"؟'))return;
  DATA[pid].tools.splice(i,1);
  db.ref('projects/'+pid+'/tools').set(DATA[pid].tools);
  const el=document.getElementById('pcard-'+pid);
  if(el)el.outerHTML=cardHTML(pid);
  renderHeader();
}

// ── Helpers ──
function fmtDate(s){if(!s)return'—';const d=new Date(s);return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')}
function weeksElapsed(s){if(!s)return 0;return Math.max(0,Math.floor((new Date()-new Date(s))/(7*864e5)))}
function weeksText(w){if(w===0)return'أقل من أسبوع';if(w===1)return'أسبوع واحد';if(w===2)return'أسبوعين';return w+' أسابيع'}
function saleCol(pct){return pct>=90?'#1b7a4a':pct>=50?'#132556':pct>=25?'#d4850a':'#59132e'}
function ringHTML(pct,color,sz){
  sz=sz||52;const st=5,r=(sz-st)/2,c=2*Math.PI*r,o=c-(pct/100)*c;
  return `<div style="position:relative;width:${sz}px;height:${sz}px;flex-shrink:0"><svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#e8e4e0" stroke-width="${st}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${st}" stroke-dasharray="${c}" stroke-dashoffset="${o}" stroke-linecap="round" style="transition:stroke-dashoffset .5s"/></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:${color};line-height:1">${pct}%</div></div>`;
}
function secHTML(pid,si,title,accent,summary,content){

    <div style="text-align:center;padding:8px 6px;border-radius:8px;background:${budgetLeft<d.budget*.2?'#fdf0ee':'var(--gl)'}"><div style="font-size:14px;font-weight:800;color:${budgetLeft<d.budget*.2?'var(--red)':'var(--g)'}">${budgetLeft.toLocaleString()}</div><div style="font-size:8px;color:var(--dg);margin-top:2px">المتبقي</div></div>
  </div>
  <div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--dg);margin-bottom:2px"><span>الإنفاق</span><span style="font-weight:700;color:var(--b)">${bPct}%</span></div><div style="height:5px;border-radius:3px;background:#ece8e3;overflow:hidden"><div style="height:100%;width:${bPct}%;border-radius:3px;background:var(--b);transition:width .5s"></div></div></div>`;

  // Section 3: المواد الاتصالية
  const overallPct=Math.round(toolsDone/d.tools.length*100);
  const s3=`<div style="height:4px;border-radius:2px;background:#ece8e3;overflow:hidden;margin-bottom:10px"><div style="height:100%;width:${overallPct}%;border-radius:2px;background:var(--g);transition:width .5s"></div></div>
  ${GROUPS.map(gr=>{
    const grTools=d.tools.map((t,i)=>({...t,_i:i})).filter(t=>t.g===gr.id);
    const done=grTools.filter(t=>t.d).length;
    return `<div style="margin-bottom:8px"><div style="font-size:9px;font-weight:700;color:var(--b);margin-bottom:4px;display:flex;justify-content:space-between"><span>${gr.title}</span><span style="color:var(--dg)">${done}/${grTools.length}</span></div><div style="display:flex;flex-wrap:wrap;gap:4px">${grTools.map(t=>{return`<div class="tool-pill ${t.d?'done':''}" style="position:relative" onclick="togTool('${pid}',${t._i})" oncontextmenu="event.preventDefault();openModal('toollink','${pid}',${t._i})"><div class="tool-chk" style="background:${t.d?'var(--g)':'var(--bd)'}">${t.d?'<svg width="8" height="8" viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div><span style="font-size:10px;font-weight:600;color:${t.d?'var(--g)':'var(--dg)'};white-space:nowrap">${t.n}</span>${t.d&&t.l?`<a href="${t.l}" target="_blank" onclick="event.stopPropagation()" style="font-size:8px;color:var(--nv);text-decoration:none">↗</a>`:''}<span onclick="event.stopPropagation();delTool('${pid}',${t._i})" style="font-size:11px;color:#c0392b;cursor:pointer;margin-right:2px;font-weight:700;opacity:.5" title="حذف">×</span></div>`;}).join('')}<div onclick="addTool('${pid}',${gr.id})" style="display:flex;align-items:center;gap:2px;padding:5px 10px;border-radius:8px;border:1.5px dashed var(--bd);cursor:pointer;font-size:10px;font-weight:600;color:var(--dg);white-space:nowrap" title="إضافة عنصر"><span style="font-size:14px;line-height:1">+</span></div></div></div>`;
  }).join('')}`;

  // Section 4: مصادر العملاء
  const srcList=d.sources||[];
  const s4=srcList.length>0?`<div style="display:flex;flex-direction:column;gap:4px">${srcList.map(s=>{
    const pct=d.leads>0?Math.round(s.count/d.leads*100):0;
    return`<div style="display:flex;align-items:center;gap:8px"><span style="font-size:10px;font-weight:600;color:var(--g);min-width:110px;white-space:nowrap">${s.name}</span><div style="flex:1;height:6px;border-radius:3px;background:#ece8e3;overflow:hidden"><div style="height:100%;width:${pct}%;border-radius:3px;background:var(--b);transition:width .5s"></div></div><span style="font-size:10px;font-weight:700;color:var(--b);min-width:28px;text-align:left">${s.count}</span><span style="font-size:8px;color:var(--dg);min-width:28px">${pct}%</span></div>`;
  }).join('')}</div>`:`<div style="text-align:center;padding:12px;font-size:11px;color:var(--dg)">لا توجد بيانات مصادر</div>`;

  // Section 5: ملاحظات
  const s5=`<div style="padding:8px 12px;border-radius:8px;background:#faf9f7;border:1px solid var(--bd);font-size:11px;line-height:1.7;color:var(--dg);cursor:pointer" onclick="openModal('note','${pid}')">${d.note||'اضغط لإضافة ملاحظة...'}</div>`;

  const sumSale=`${d.leads} عميل · ${d.sold} مباع · ${remain} متبقي`;
  const sumCamp=`${weeks} أسبوع · ${isActive?'مستمرة':'منتهية'}`;
  const sumBudget=`${d.spent.toLocaleString()} / ${d.budget.toLocaleString()} · CPL ${cpl} ر.س`;
  const sumTools=`${toolsDone}/${d.tools.length} جاهز`;
  const sumSrc=srcList.length>0?srcList[0].name+' ('+srcList[0].count+')':'لا توجد بيانات';
  const sumNote=d.note?d.note.substring(0,35)+'...':'';

  return `<div id="pcard-${pid}" style="background:var(--w);border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05);border:1px solid var(--bd)">
    <div style="padding:16px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center">
      <a href="${d.url||'#'}" target="_blank" rel="noopener noreferrer" style="text-decoration:none"><div style="font-size:20px;font-weight:800;color:var(--g)">${p.name}</div><div style="font-size:12px;color:var(--b);margin-top:2px">${p.loc}</div></a>
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="openModal('edit','${pid}')" style="padding:5px 12px;border-radius:7px;border:1px solid var(--bd);background:var(--w);color:var(--dg);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit">تعديل</button>
        ${ringHTML(soldPct,sc)}
      </div>
    </div>
    ${secHTML(pid,0,'أرقام البيع','#1b7a4a',sumSale,s0)}
    ${secHTML(pid,1,'مدة الحملة','#132556',sumCamp,s1)}
    ${secHTML(pid,2,'الميزانية','#a88575',sumBudget,s2)}
    ${secHTML(pid,3,'المواد الاتصالية','#003f3f',sumTools,s3)}
    ${secHTML(pid,4,'مصادر العملاء','#3498db',sumSrc,s4)}
    ${secHTML(pid,5,'ملاحظات','#59132e',sumNote,s5)}
  </div>`;
}

function expandAll(){PROJECTS.forEach(p=>{for(let i=0;i<6;i++)OPEN[p.id+'_'+i]=true});render()}
function collapseAll(){PROJECTS.forEach(p=>{for(let i=0;i<6;i++)OPEN[p.id+'_'+i]=false});render()}

// ── Views ──
function switchView(v){
  VIEW=v;
  ['cards','table','analytics'].forEach(x=>{
    document.getElementById('view-'+x).style.display=x===v?'block':'none';
    const tb=document.getElementById('tab-'+x);
    tb.classList.toggle('active-tab',x===v);
  });
  if(v==='table')renderTable();
  else if(v==='analytics')renderAnalytics();
}

function tblRows(){
  return PROJECTS.map(p=>{
    const d=DATA[p.id];if(!d)return null;
    const soldPct=d.units>0?Math.round(((d.sold+d.booked)/d.units)*100):0;
    const cpl=d.leads>0?Math.round(d.spent/d.leads):0;
    const matPct=Math.round(d.tools.filter(t=>t.d).length/d.tools.length*100);
    return{pid:p.id,name:p.name,loc:p.loc,units:d.units,sold:d.sold,booked:d.booked,remain:d.units-d.sold-d.booked,soldPct,leads:d.leads,cpl,budget:d.budget,spent:d.spent,matPct,weeks:weeksElapsed(d.promoStart)};
  }).filter(Boolean);
}

function sortTable(col){
  TABLE_SORT=TABLE_SORT.col===col?{col,dir:TABLE_SORT.dir==='asc'?'desc':'asc'}:{col,dir:'desc'};
  renderTable();
}

function renderTable(){
  let rows=tblRows();
  if(TABLE_FILTER){const f=TABLE_FILTER;rows=rows.filter(r=>r.name.includes(f)||r.loc.includes(f))}
  const{col,dir}=TABLE_SORT;
  rows.sort((a,b)=>a[col]>b[col]?(dir==='asc'?1:-1):a[col]<b[col]?(dir==='asc'?-1:1):0);
  const arrow=c=>TABLE_SORT.col===c?(TABLE_SORT.dir==='asc'?' ▲':' ▼'):'';
  const cols=[
    {k:'name',l:'المشروع',w:'130px'},{k:'soldPct',l:'%البيع'+arrow('soldPct'),w:'70px'},{k:'sold',l:'مباع'+arrow('sold'),w:'55px'},
    {k:'booked',l:'محجوز'+arrow('booked'),w:'55px'},{k:'remain',l:'متبقي'+arrow('remain'),w:'55px'},{k:'units',l:'وحدات'+arrow('units'),w:'55px'},
    {k:'leads',l:'تسجيل'+arrow('leads'),w:'70px'},{k:'cpl',l:'CPL'+arrow('cpl'),w:'65px'},
    {k:'budget',l:'الميزانية'+arrow('budget'),w:'90px'},{k:'spent',l:'المصروف'+arrow('spent'),w:'90px'},
    {k:'matPct',l:'المواد'+arrow('matPct'),w:'65px'},{k:'weeks',l:'أسابيع'+arrow('weeks'),w:'65px'},
  ];
  document.getElementById('tableContainer').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <input type="text" placeholder="ابحث عن مشروع..." value="${TABLE_FILTER}" oninput="TABLE_FILTER=this.value;renderTable()" style="padding:7px 12px;border-radius:8px;border:1px solid var(--bd);font-family:inherit;font-size:12px;width:220px;outline:none">
      <span style="font-size:11px;color:var(--dg)">${rows.length} مشروع</span>
    </div>
    <div style="overflow-x:auto;border-radius:12px;border:1px solid var(--bd);background:var(--w)">
    <table class="tbl">
      <thead><tr>${cols.map(c=>`<th style="width:${c.w}" onclick="sortTable('${c.k}')">${c.l}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r=>{
        const sc=saleCol(r.soldPct);
        return`<tr>
          <td><div style="font-weight:700;color:var(--g);font-size:12px">${r.name}</div><div style="font-size:10px;color:var(--b)">${r.loc}</div></td>
          <td><span style="font-weight:800;color:${sc}">${r.soldPct}%</span></td>
          <td style="color:#1b7a4a;font-weight:700">${r.sold}</td>
          <td style="color:#d4850a;font-weight:700">${r.booked}</td>
          <td style="color:#c0392b;font-weight:700">${r.remain}</td>
          <td style="color:var(--dg)">${r.units}</td>
          <td style="color:var(--nv);font-weight:600">${r.leads.toLocaleString()}</td>
          <td><span style="background:var(--bl);padding:2px 7px;border-radius:5px;font-weight:700;color:var(--b)">${r.cpl} ر.س</span></td>
          <td style="color:var(--dg)">${r.budget.toLocaleString()}</td>
          <td style="color:var(--dg)">${r.spent.toLocaleString()}</td>
          <td><div style="display:flex;align-items:center;gap:5px"><div style="flex:1;height:5px;border-radius:3px;background:#ece8e3;overflow:hidden"><div style="height:100%;width:${r.matPct}%;background:var(--g)"></div></div><span style="font-size:9px;color:var(--dg)">${r.matPct}%</span></div></td>
          <td style="color:var(--dg)">${r.weeks} أسبوع</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
}

function renderAnalytics(){
  Object.values(_charts).forEach(c=>c.destroy());_charts={};

  const sn=p=>p.name.replace('طليعة المشرقية','طليعة').replace('سَنا مكين','سنا').replace('مكين ','م');
  const labels=PROJECTS.map(sn);
  const sold=PROJECTS.map(p=>DATA[p.id]?.sold||0);
  const booked=PROJECTS.map(p=>DATA[p.id]?.booked||0);
  const remain=PROJECTS.map(p=>{const d=DATA[p.id];return d?d.units-d.sold-d.booked:0});
  const leads=PROJECTS.map(p=>DATA[p.id]?.leads||0);
  const budgets=PROJECTS.map(p=>DATA[p.id]?.budget||0);
  const spents=PROJECTS.map(p=>DATA[p.id]?.spent||0);
  const cpls=PROJECTS.map(p=>{const d=DATA[p.id];return d&&d.leads>0?Math.round(d.spent/d.leads):0});
  const mats=PROJECTS.map(p=>{const d=DATA[p.id];return d?Math.round(d.tools.filter(t=>t.d).length/d.tools.length*100):0});
  const tSold=sold.reduce((a,b)=>a+b,0),tBooked=booked.reduce((a,b)=>a+b,0),tRemain=remain.reduce((a,b)=>a+b,0);
  const tLeads=leads.reduce((a,b)=>a+b,0),tSpent=spents.reduce((a,b)=>a+b,0),tBudget=budgets.reduce((a,b)=>a+b,0);
  const tUnits=PROJECTS.reduce((s,p)=>s+(DATA[p.id]?.units||0),0);
  const avgCPL=tLeads>0?Math.round(tSpent/tLeads):0;
  const salePct=tUnits>0?Math.round((tSold+tBooked)/tUnits*100):0;
  const budPct=Math.round(tSpent/tBudget*100);

  const kpis=[
    {v:tLeads.toLocaleString(),l:'إجمالي التسجيلات',sub:`عبر ${PROJECTS.length} مشروع`,subc:'#1b7a4a',tag:'هذا الشهر',tagBg:'#eef1f8',tagC:'#132556'},
    {v:(tSold+tBooked)+'',l:'مباع + محجوز',sub:`${salePct}% من ${tUnits} وحدة`,subc:'#1b7a4a',bar:salePct,barC:'linear-gradient(90deg,#1b7a4a,#5bb38a)',tag:tRemain+' متبقي',tagBg:'#fdf0ee',tagC:'#c0392b'},
    {v:avgCPL+' ر.س',l:'متوسط تكلفة الليد',sub:'إنفاق '+tSpent.toLocaleString()+' ر.س',subc:'var(--dg)',tag:'CPL',tagBg:'var(--bl)',tagC:'var(--b)'},
    {v:Math.round(tBudget/1000)+'K ر.س',l:'إجمالي الميزانية',sub:'أُنفق '+Math.round(tSpent/1000)+'K · متبقي '+Math.round((tBudget-tSpent)/1000)+'K',subc:'var(--dg)',bar:budPct,barC:'linear-gradient(90deg,var(--g),#4a9e9e)',tag:budPct+'%',tagBg:'var(--gl)',tagC:'var(--g)'},
  ];

  document.getElementById('analyticsContainer').innerHTML=`
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px">
    ${kpis.map(k=>`<div class="kpi-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:10px;font-weight:600;color:var(--dg)">${k.l}</span>
        <span style="background:${k.tagBg};color:${k.tagC};padding:2px 8px;border-radius:5px;font-size:9px;font-weight:600">${k.tag}</span>
      </div>
      <div style="font-size:26px;font-weight:800;color:var(--bk);letter-spacing:-.5px;line-height:1">${k.v}</div>
      ${k.bar!==undefined?`<div style="margin:8px 0 2px;height:4px;border-radius:2px;background:#ece8e3;overflow:hidden"><div style="height:100%;width:${k.bar}%;background:${k.barC};transition:width .8s ease"></div></div>`:'<div style="margin-top:8px"></div>'}
      <div style="font-size:10px;color:${k.subc}">${k.sub}</div>
    </div>`).join('')}
  </div>

  <div style="display:grid;grid-template-columns:1.8fr 1fr;gap:14px;margin-bottom:14px">
    <div class="kpi-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
        <div><div style="font-size:14px;font-weight:700;color:var(--bk)">نظرة عامة على التسجيلات والمبيعات</div><div style="font-size:10px;color:var(--dg);margin-top:3px">تسجيلات الاهتمام مقارنةً بالمبيعات لكل مشروع</div></div>
        <div style="display:flex;gap:14px;font-size:9px;color:var(--dg);white-space:nowrap;margin-top:4px">
          <span style="display:flex;align-items:center;gap:5px"><span style="width:18px;height:3px;border-radius:2px;background:#003f3f;display:inline-block"></span>تسجيلات</span>
          <span style="display:flex;align-items:center;gap:5px"><span style="width:18px;height:3px;border-radius:2px;background:#a88575;display:inline-block"></span>مباع + محجوز</span>
        </div>
      </div>
      <div style="height:220px"><canvas id="chArea"></canvas></div>
    </div>
    <div class="kpi-card">
      <div style="margin-bottom:12px"><div style="font-size:14px;font-weight:700;color:var(--bk)">توزيع الوحدات</div><div style="font-size:10px;color:var(--dg);margin-top:3px">إجمالي ${tUnits} وحدة</div></div>
      <div style="height:190px"><canvas id="chDonut"></canvas></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:14px">
        ${[{l:'مباع',v:tSold,c:'#1b7a4a',bg:'#edf7f0'},{l:'محجوز',v:tBooked,c:'#d4850a',bg:'#fef7ec'},{l:'متبقي',v:tRemain,c:'#c0392b',bg:'#fdf0ee'}].map(x=>`<div style="text-align:center;padding:8px 4px;border-radius:8px;background:${x.bg}"><div style="font-size:18px;font-weight:800;color:${x.c}">${x.v}</div><div style="font-size:9px;color:var(--dg);margin-top:2px">${x.l}</div></div>`).join('')}
      </div>
    </div>
  </div>

  <div class="kpi-card" style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
      <div><div style="font-size:14px;font-weight:700;color:var(--bk)">مقارنة الميزانية والإنفاق</div><div style="font-size:10px;color:var(--dg);margin-top:3px">بالريال السعودي لكل مشروع</div></div>
      <div style="display:flex;gap:14px;font-size:9px;color:var(--dg)">
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:rgba(0,63,63,.15);display:inline-block"></span>الميزانية</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:#a88575;display:inline-block"></span>المصروف</span>
      </div>
    </div>
    <div style="height:150px"><canvas id="chBudget"></canvas></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
    <div class="kpi-card">
      <div style="margin-bottom:12px"><div style="font-size:14px;font-weight:700;color:var(--bk)">تكلفة الليد لكل مشروع</div><div style="font-size:10px;color:var(--dg);margin-top:3px">ريال لكل تسجيل · أخضر ≤40 · برتقالي ≤60 · أحمر >60</div></div>
      <div style="height:200px"><canvas id="chCPL"></canvas></div>
    </div>
    <div class="kpi-card">
      <div style="margin-bottom:12px"><div style="font-size:14px;font-weight:700;color:var(--bk)">جاهزية المواد الاتصالية</div><div style="font-size:10px;color:var(--dg);margin-top:3px">نسبة المواد المكتملة من 13 مادة</div></div>
      <div style="height:200px"><canvas id="chMat"></canvas></div>
    </div>
  </div>`;

  Chart.defaults.font.family="'IBM Plex Sans Arabic',sans-serif";
  Chart.defaults.color='#6b6460';
  const F={size:9},FN={size:10};
  const noG={grid:{display:false},border:{display:false},ticks:{font:F}};
  const softG={grid:{color:'#f0ece8',drawBorder:false},border:{display:false},ticks:{font:F}};
  const tip={rtl:true,backgroundColor:'rgba(20,20,20,.82)',titleFont:{size:11},bodyFont:{size:10},padding:10,cornerRadius:8,borderColor:'rgba(255,255,255,.08)',borderWidth:1};
  const base={responsive:true,maintainAspectRatio:false,animation:{duration:900,easing:'easeInOutQuart'},plugins:{legend:{display:false},tooltip:tip}};

  // Area chart
  const aC=document.getElementById('chArea').getContext('2d');
  const gA=aC.createLinearGradient(0,0,0,220);gA.addColorStop(0,'rgba(0,63,63,.18)');gA.addColorStop(1,'rgba(0,63,63,0)');
  const gB=aC.createLinearGradient(0,0,0,220);gB.addColorStop(0,'rgba(168,133,117,.18)');gB.addColorStop(1,'rgba(168,133,117,0)');
  _charts.area=new Chart(aC,{type:'line',data:{labels,datasets:[
    {label:'تسجيلات',data:leads,borderColor:'#003f3f',backgroundColor:gA,borderWidth:2.5,fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#fff',pointBorderColor:'#003f3f',pointBorderWidth:2,pointHoverRadius:6},
    {label:'مباع+محجوز',data:sold.map((v,i)=>v+booked[i]),borderColor:'#a88575',backgroundColor:gB,borderWidth:2,fill:true,tension:.4,pointRadius:3,pointBackgroundColor:'#fff',pointBorderColor:'#a88575',pointBorderWidth:2,pointHoverRadius:5}
  ]},options:{...base,scales:{x:{...noG},y:{...softG,ticks:{font:F,callback:v=>v>=1000?(v/1000).toFixed(0)+'K':v}}}}});

  // Donut
  _charts.donut=new Chart(document.getElementById('chDonut'),{type:'doughnut',data:{labels:['مباع','محجوز','متبقي'],datasets:[{data:[tSold,tBooked,tRemain],backgroundColor:['#1b7a4a','#d4850a','#e8e4e0'],borderWidth:0,hoverOffset:10}]},options:{responsive:true,maintainAspectRatio:false,cutout:'74%',animation:{duration:1000,easing:'easeInOutQuart'},plugins:{legend:{display:false},tooltip:{...tip,callbacks:{label:ctx=>' '+ctx.label+': '+ctx.raw+' وحدة'}}}}});

  // Budget
  _charts.budget=new Chart(document.getElementById('chBudget'),{type:'bar',data:{labels,datasets:[
    {label:'الميزانية',data:budgets,backgroundColor:'rgba(0,63,63,.1)',borderRadius:6,borderSkipped:false,barPercentage:.7},
    {label:'المصروف',data:spents,backgroundColor:'#a88575',borderRadius:6,borderSkipped:false,barPercentage:.7}
  ]},options:{...base,scales:{x:{...noG},y:{...softG,ticks:{font:F,callback:v=>Math.round(v/1000)+'K'}}}}});

  // CPL
  _charts.cpl=new Chart(document.getElementById('chCPL'),{type:'bar',data:{labels,datasets:[{data:cpls,backgroundColor:cpls.map(v=>v<=40?'#1b7a4a':v<=60?'#d4850a':'#c0392b'),borderRadius:6,borderSkipped:false,barPercentage:.65}]},options:{...base,indexAxis:'y',scales:{y:{...noG,ticks:{font:F}},x:{...softG,ticks:{font:F}}}}});

  // Materials
  _charts.mat=new Chart(document.getElementById('chMat'),{type:'bar',data:{labels,datasets:[{data:mats,backgroundColor:mats.map(v=>v===100?'#1b7a4a':v>=70?'#003f3f':'#d4850a'),borderRadius:6,borderSkipped:false,barPercentage:.65}]},options:{...base,indexAxis:'y',scales:{y:{...noG,ticks:{font:F}},x:{...softG,max:100,ticks:{font:F,callback:v=>v+'%'}}}}});
}

// ── Render ──
function renderHeader(){
  const tL=PROJECTS.reduce((s,p)=>s+(DATA[p.id]?.leads||0),0);
  const tS=PROJECTS.reduce((s,p)=>s+(DATA[p.id]?.sold||0),0);
  const tB=PROJECTS.reduce((s,p)=>s+(DATA[p.id]?.booked||0),0);
  const tU=PROJECTS.reduce((s,p)=>s+(DATA[p.id]?.units||0),0);
  const tSp=PROJECTS.reduce((s,p)=>s+(DATA[p.id]?.spent||0),0);
  const sP=tU>0?Math.round((tS+tB)/tU*100):0;
  const avgCPL=tL>0?Math.round(tSp/tL):0;
  document.getElementById('headerStats').innerHTML=[
    {v:tL.toLocaleString(),l:'تسجيل',c:'#fff'},
    {v:tS+tB,l:'مباع + محجوز',c:'#7be0a8'},
    {v:sP+'%',l:'نسبة البيع',c:'#a88575'},
    {v:avgCPL+' ر.س',l:'متوسط CPL',c:'#b8d8d0'},
  ].map(s=>`<div class="dash-stat"><div class="v" style="color:${s.c}">${s.v}</div><div class="l">${s.l}</div></div>`).join('');
}

function render(){
  renderHeader();
  const ordered=getOrderedProjects();
  document.getElementById('projectsGrid').innerHTML=ordered.map(p=>cardHTML(p.id)).join('');
}

// ── Project Order ──
let _projOrder=null;
function getOrderedProjects(){
  if(!_projOrder)return PROJECTS;
  return _projOrder.map(id=>PROJECTS.find(p=>p.id===id)).filter(Boolean);
}
function loadOrder(){
  const user=localStorage.getItem('makeen_user')||sessionStorage.getItem('makeen_user');
  if(!user)return;
  db.ref('order/'+user).on('value',snap=>{
    if(snap.exists()&&Array.isArray(snap.val())){
      _projOrder=snap.val();
    }
    if(Object.keys(DATA).length>0)render();
  });
}

let _dragIdx=null;
function openOrderModal(){
  const list=document.getElementById('orderList');
  const ordered=getOrderedProjects();
  list.innerHTML=ordered.map((p,i)=>`<div class="order-item" draggable="true" data-idx="${i}" style="padding:10px 14px;margin-bottom:6px;border-radius:8px;border:1.5px solid var(--bd);background:var(--w);cursor:grab;display:flex;align-items:center;gap:10px;font-family:inherit;user-select:none" ondragstart="_dragIdx=${i};this.style.opacity='.5'" ondragend="this.style.opacity='1'" ondragover="event.preventDefault()" ondrop="reorderDrop(${i})"><span style="font-size:14px;color:var(--dg)">☰</span><span style="font-size:13px;font-weight:700;color:var(--g);flex:1">${p.name}</span><span style="font-size:10px;color:var(--dg)">${p.loc}</span></div>`).join('');
  document.getElementById('orderOverlay').style.display='flex';
}
function reorderDrop(toIdx){
  const list=document.getElementById('orderList');
  const items=[...list.children];
  const ordered=getOrderedProjects();
  const ids=ordered.map(p=>p.id);
  const [moved]=ids.splice(_dragIdx,1);
  ids.splice(toIdx,0,moved);
  _projOrder=ids;
  openOrderModal();
}
function closeOrderModal(){document.getElementById('orderOverlay').style.display='none';}
function saveOrder(){
  const user=localStorage.getItem('makeen_user')||sessionStorage.getItem('makeen_user');
  if(user&&_projOrder){db.ref('order/'+user).set(_projOrder);}
  closeOrderModal();
  render();
}

</script>
</body>
